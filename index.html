<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { background: #0d1117; color: #c9d1d9; font-family: 'Courier New', Courier, monospace; text-align: center; margin: 0; padding: 10px; }
        canvas { background-color: #0d1117; border: 2px solid #30363d; display: block; margin: 10px auto; }
        input { background: #161b22; color: #58a6ff; border: 1px solid #30363d; padding: 12px; width: 330px; font-size: 18px; margin-bottom: 10px; border-radius: 5px; }
        #teclado { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; width: 350px; margin: 0 auto; }
        button { padding: 10px; background: #21262d; color: white; border: 1px solid #30363d; cursor: pointer; font-weight: bold; }
        .disparar { grid-column: span 5; background: #238636; margin-top: 5px; }
        .clear { background: #a62626; }
    </style>
</head>
<body>
    <h2>MATERRA TACTICS</h2>
    <canvas id="juego" width="600" height="600"></canvas>
    
    <input type="text" id="funcion" value="Math.sin(x/20)*100">
    
    <div id="teclado">
        <button onclick="add('Math.sin(x)')">sin</button><button onclick="add('Math.cos(x)')">cos</button><button onclick="add('Math.tan(x)')">tan</button><button onclick="borrarPos()">DEL</button><button class="clear" onclick="clearInput()">C</button>
        <button onclick="add('7')">7</button><button onclick="add('8')">8</button><button onclick="add('9')">9</button><button onclick="add('/')">/</button><button onclick="add('*')">*</button>
        <button onclick="add('4')">4</button><button onclick="add('5')">5</button><button onclick="add('6')">6</button><button onclick="add('-')">-</button><button onclick="add('+')">+</button>
        <button onclick="add('1')">1</button><button onclick="add('2')">2</button><button onclick="add('3')">3</button><button onclick="add('(')">(</button><button onclick="add(')')">)</button>
        <button onclick="add('0')">0</button><button onclick="add('.')">.</button><button onclick="add('x')">x</button><button onclick="add('Math.PI')">π</button><button onclick="add('20')">20</button>
        <button class="disparar" onclick="disparar()">DISPARAR</button>
    </div>
    <script>
        const input = document.getElementById('funcion');

        function add(v) {
            const start = input.selectionStart;
            const end = input.selectionEnd;
            const text = input.value;
            
            // Inserta el valor en la posición del cursor
            input.value = text.slice(0, start) + v + text.slice(end);
            
            // Mueve el cursor después del valor insertado
            input.focus();
            input.selectionStart = input.selectionEnd = start + v.length;
        }

        function borrarPos() {
            const start = input.selectionStart;
            const end = input.selectionEnd;
            const text = input.value;

            if (start !== end) {
                // Borra la selección si el usuario resaltó texto
                input.value = text.slice(0, start) + text.slice(end);
                input.selectionStart = input.selectionEnd = start;
            } else if (start > 0) {
                // Borra el carácter anterior al cursor
                input.value = text.slice(0, start - 1) + text.slice(start);
                input.selectionStart = input.selectionEnd = start - 1;
            }
            input.focus();
        }

        function clearInput() { 
            input.value = ""; 
            input.focus();
        }
    </script>  
    <script src="config.js"></script>
    <script src="Game.js"></script>
    <script src="Main.js"></script>
</body>
</html>
